exp_name: ''
project_name: ${env.name}
cuda_deterministic: false
device: ???
gamma: 0.99
seed: 1
pretrain: null
num_seed_steps: 1000
only_expert_states: false
train:
  batch: 64
  use_target: false
  soft_update: false
expert:
  demos: 1
  subsample_freq: 1
eval:
  policy: null
  threshold: 21
  use_baselines: false
  eps: 10
  transfer: false
  expert_env: ''
env:
  replay_mem: 1000000.0
  initial_mem: 5000
  eps_steps: 1000
  eps_window: 10
  learn_steps: 20000
  eval_interval: 200
  from_pixels: false
  name: nasim:SmallHoneypotPO-v0
  demo: nasim:SmallHoneypotPO-v0_1000.pkl
method:
  type: iq
  loss: value
  constrain: false
  grad_pen: false
  chi: false
  tanh: false
  regularize: false
  div: null
  alpha: 0.5
  lambda_gp: 10
  mix_coeff: 1
log_interval: 20
log_dir: logs/
save_interval: 5
hydra_base_dir: ''
eval_only: false
offline: false
num_actor_updates: 1
agent:
  name: softq
  class: agent.softq.SoftQ
  obs_dim: ???
  action_dim: ???
  critic_cfg: ${q_net}
  critic_lr: 0.0001
  critic_betas:
  - 0.9
  - 0.999
  init_temp: 0.01
  critic_target_update_frequency: 4
  critic_tau: 0.1
q_net:
  _target_: agent.softq_models.SimpleQNetwork
  obs_dim: ${agent.obs_dim}
  action_dim: ${agent.action_dim}
